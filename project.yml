name: ClaudeMonitor
options:
  bundleIdPrefix: app.claudemonitor
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    ENABLE_HARDENED_RUNTIME: NO
targets:
  ClaudeMonitor:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
      - path: Sources/Shared
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: ClaudeMonitor
        PRODUCT_BUNDLE_IDENTIFIER: app.claudemonitor.ClaudeMonitor
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_STANDALONE_ICON_BEHAVIOR: all
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: ClaudeWidgetExtension
        embed: true
  ClaudeWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/Widget
      - path: Sources/Shared
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.claudemonitor.ClaudeMonitor.ClaudeWidget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/Widget.entitlements
        GENERATE_INFOPLIST_FILE: NO
